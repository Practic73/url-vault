<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Добавить ссылку')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h1 class="h3 mb-4">Добавить ссылку</h1>

            <form th:action="@{/add}" method="post" th:object="${request}">
                <div class="mb-3">
                    <label for="title" class="form-label">Название <span class="text-danger">*</span></label>
                    <input type="text" id="title" name="title" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           th:value="*{title}" maxlength="200" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label for="url" class="form-label">URL <span class="text-danger">*</span></label>
                    <input type="url" id="url" name="url" class="form-control"
                           th:classappend="${#fields.hasErrors('url')} ? 'is-invalid'"
                           th:value="*{url}" maxlength="2000" required
                           placeholder="https://example.com">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('url')}"
                         th:errors="*{url}"></div>
                </div>

                <div class="mb-3">
                    <label for="tag" class="form-label">Тег</label>
                    <input type="text" id="tag" name="tag" class="form-control"
                           th:classappend="${#fields.hasErrors('tag')} ? 'is-invalid'"
                           th:value="*{tag}" maxlength="50" placeholder="например: dev, news, work">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('tag')}"
                         th:errors="*{tag}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea id="description" name="description" class="form-control" rows="3"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                              maxlength="500" placeholder="Краткое описание ссылки..."
                              th:text="*{description}"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{/}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>

            <p class="text-muted small mt-3">
                &#128737; Перед сохранением URL будет проверен системой безопасности.
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
