<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' — URL Vault'">URL Vault</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">&#128279; URL Vault</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Мои ссылки</a>
            <a class="nav-link" th:href="@{/add}">Добавить</a>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="text-center text-muted mt-5 mb-3 small">
    Personal URL Vault &mdash; демонстрационное приложение для магистерской диссертации
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
